# CloudKernel Simulation Configuration
# Modify these settings to customize the simulation

# Number of Virtual Machines (1-10)
vm.count=5

# Number of cycles each VM will execute
cycle.count=4

# Semaphore Limits for Shared Resources
semaphore.cpu.permits=3
semaphore.memory.permits=2
semaphore.network.permits=2

# VM Task Duration Range (in milliseconds)
task.duration.min=500
task.duration.max=1500

# Resource Acquisition Timeout (in milliseconds)
timeout.duration=2000

# GUI Settings
gui.enabled=true
gui.theme=dark
gui.font=Monospaced

# Logging Levels (VERBOSE, NORMAL, QUIET)
logging.level=NORMAL

# Statistics Collection
stats.enabled=true
