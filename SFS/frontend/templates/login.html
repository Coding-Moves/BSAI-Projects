{% extends 'base.html' %}
{% block content %}
<div class="card mx-auto" style="max-width:420px">
  <div class="card-body">
    <h4 class="card-title">Login</h4>
    <form id="loginForm">
      <div class="mb-3"><input id="username" class="form-control" placeholder="Username" /></div>
      <div class="mb-3"><input id="password" type="password" class="form-control" placeholder="Password" /></div>
      <button class="btn btn-primary w-100" type="submit">Login</button>
    </form>
    <hr/>
    <a href="/register.html">Create account</a>
  </div>
</div>
<script>
const form = document.getElementById('loginForm')
form.addEventListener('submit', async (e)=>{
  e.preventDefault()
  const username = document.getElementById('username').value
  const password = document.getElementById('password').value
  try{
    const resp = await axios.post('/api/auth/token/', {username,password})
    localStorage.setItem('sfs_token', resp.data.access)
    window.location = '/dashboard.html'
  }catch(err){
    alert('Login failed')
  }
})
</script>
{% endblock %}
